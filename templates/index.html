<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent AI Orchestration</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col items-center p-8">

    <div class="w-full max-w-3xl bg-gray-800 rounded-lg shadow-xl p-6 border border-gray-700">
        <h1 class="text-3xl font-bold mb-2 text-indigo-400 text-center">🤖 Multi-Agent AI Orchestration</h1>
        <p class="text-gray-400 text-center mb-6">Drop messy data, define your objective, and watch the agents work.</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">📋 Raw Context / Data Dump</label>
                <textarea id="context" rows="6" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Paste data here..."></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">🎯 Objective / Goal</label>
                <input id="objective" type="text" class="w-full bg-gray-700 border border-gray-600 rounded p-2 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="e.g., Find 3 weaknesses...">
            </div>

            <button onclick="runOrchestrator()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition">
                🚀 Fire Up Multi-Agent Server
            </button>
        </div>

        <div id="output-box" class="mt-8 p-4 bg-gray-900 rounded border border-gray-700 hidden">
            <h3 class="text-lg font-semibold text-green-400 mb-2">✨ Final Output:</h3>
            <div id="output-text" class="whitespace-pre-line text-gray-300 text-sm"></div>
        </div>
    </div>

    <script>
        async function runOrchestrator() {
            const context = document.getElementById('context').value;
            const objective = document.getElementById('objective').value;
            const outputBox = document.getElementById('output-box');
            const outputText = document.getElementById('output-text');

            if(!context || !objective) return alert("Please fill in both fields before running the orchestrator.");

            outputText.innerText = "Processing State Graph... Please wait...";
            outputBox.classList.remove('hidden');

            try {
                const response = await fetch('http://127.0.0.1:8000/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ context_data: context, objective: objective })
                });
                
                const data = await response.json();
                
                if(response.ok && data.status === 'success') {
                    outputText.innerText = data.final_analysis;
                } else {
                    outputText.innerText = "fail to fetch";
                }
            } catch (err) {
                outputText.innerText = "fail to fetch";
            }
        }
    </script>
</body>
</html>
